name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # Required for OIDC (takumi-guard)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: flatt-security/setup-takumi-guard-pypi@v1
        with:
          bot-id: "BT01KP0J2WVXM2XRECK5RCT62XRH" # ayokura

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest apps/api/tests -q -n 2
        env:
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OMP_NUM_THREADS: "1"
          NUMBA_NUM_THREADS: "1"
